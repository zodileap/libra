  - operation_id: runtimeStream
    method: GET
    path: /workflow/v1/runtime-stream
    auth: none
    transport: websocket
    request:
      command_envelope:
        type_field: type
        payload_field: payload
        encoding: protojson
      commands:
        run.start:
          payload_message: libra.runtime.v1.RunStartRequest
          required_fields:
            - context.tenantId
            - context.userId
            - context.projectId
            - context.sessionId
            - agentKey
            - provider
            - prompt
        run.cancel:
          payload_message: libra.runtime.v1.CancelRunRequest
        approval.submit:
          payload_message: libra.runtime.v1.SubmitApprovalRequest
        user_input.submit:
          payload_message: libra.runtime.v1.SubmitUserInputRequest
    response:
      event_envelope:
        type_field: type
        payload_field: payload
        encoding: protojson
      event_payloads:
        started: libra.runtime.v1.RunEvent
        delta: libra.runtime.v1.RunEvent
        tool_call_started: libra.runtime.v1.RunEvent
        tool_call_finished: libra.runtime.v1.RunEvent
        require_approval: libra.runtime.v1.RunEvent
        request_user_input: libra.runtime.v1.RunEvent
        final: libra.runtime.v1.RunEvent
        cancelled: libra.runtime.v1.RunEvent
        error: libra.runtime.v1.RunEvent | { message: string }
    errors:
      - bad_request
      - internal_error
    examples:
      request:
        headers:
          Upgrade: websocket
          Connection: Upgrade
        commands:
          - type: run.start
            payload:
              context:
                tenantId: tenant_example_01
                userId: usr_example_admin
                projectId: project_example_01
                sessionId: sess_example_01
              agentKey: agent-code-default
              provider: codex
              prompt: 请分析当前项目中的运行时适配边界
      success:
        events:
          - type: started
            payload:
              traceId: trace_example_01
              sessionId: sess_example_01
              kind: started
              message: runtime run started
          - type: delta
            payload:
              traceId: trace_example_01
              sessionId: sess_example_01
              kind: delta
              delta: 正在读取仓库结构...
          - type: final
            payload:
              traceId: trace_example_01
              sessionId: sess_example_01
              kind: final
              finalResult:
                traceId: trace_example_01
                displayMessage: 分析完成
